name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug OIDC token claims
        run: |
          TOKEN=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          PAYLOAD=$(echo "$TOKEN" | cut -d '.' -f2)
          MOD=$(( ${#PAYLOAD} % 4 ))
          if [ $MOD -eq 2 ]; then PAYLOAD="${PAYLOAD}=="; elif [ $MOD -eq 3 ]; then PAYLOAD="${PAYLOAD}="; fi
          echo "$PAYLOAD" | tr '_-' '/+' | base64 -d | jq '{aud, sub, iss, repository, ref}'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Start Amplify deploy
        id: start
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "${{ vars.AMPLIFY_APP_ID }}" \
            --branch-name main \
            --job-type RELEASE \
            --query jobSummary.jobId --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy to finish
        run: |
          APP_ID="${{ vars.AMPLIFY_APP_ID }}"
          JOB_ID="${{ steps.start.outputs.job_id }}"
          while true; do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name main \
              --job-id "$JOB_ID" \
              --query "job.summary.status" --output text)
            echo "Status: $STATUS"
            case "$STATUS" in
              SUCCEED) exit 0 ;;
              FAILED|CANCELLED) echo "Amplify job failed"; exit 1 ;;
              *) sleep 15 ;;
            esac
          done
